<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setlist — Charlie Brown Jr.</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --card-hover: #1e222b;
      --accent: #ffb020;
      --accent-soft: rgba(255, 176, 32, 0.15);
      --text: #f2f3f5;
      --muted: #8b909a;
      --line: #262a33;
      --done: #3ddc84;
      /* cores de saúde */
      --h-green: #3ddc84;
      --h-amber: #ffb020;
      --h-red: #ff5c5c;
      --h-none: #454b57;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1b1f2a 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header {
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.5;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 16px 0;
      margin-bottom: 8px;
      background: linear-gradient(var(--bg) 70%, transparent);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mini-meter {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6px;
      height: 3px;
      background: var(--line);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .mini-meter.show { opacity: 1; }

    .mini-fill {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--done);
      transition: width .4s cubic-bezier(.4, 0, .2, 1);
    }

    .search {
      flex: 1 1 220px;
      position: relative;
    }

    .search input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--muted);
    }

    /* toggle de ordenação */
    .sorter {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 11px;
    }
    .chip {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .chip:hover { color: var(--text); }
    .chip.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .meter {
      margin: 4px 0 16px;
    }

    .scale {
      margin: 0 0 26px;
    }
    .scale-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .scale-info {
      color: var(--text);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    #scale {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--line);
      outline: none;
      cursor: pointer;
    }
    #scale::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    #scale::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      cursor: pointer;
    }
    .scale-ends {
      display: flex;
      justify-content: space-between;
      margin-top: 7px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meter-bar {
      height: 12px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .meter-fill {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--h-green);
      transition: width .4s cubic-bezier(.4, 0, .2, 1), background .4s;
    }

    .meter-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .meter-labels b { color: var(--done); }
    .meter-labels .attn-n { color: var(--h-red); }

    ol {
      list-style: none;
    }

    li a.song {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-bottom: 10px;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      transition: background .15s, border-color .15s, transform .08s;
    }

    li a.song:hover {
      background: var(--card-hover);
      border-color: #333844;
      transform: translateY(-1px);
    }

    li a.song:active { transform: translateY(0); }

    .num {
      flex: 0 0 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .title {
      flex: 1;
      font-size: 16px;
      font-weight: 600;
      min-width: 0;
    }

    .ago {
      flex: 0 0 auto;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .dur {
      flex: 0 0 auto;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 8px;
      border-radius: 7px;
    }

    /* bolinha de saúde */
    .health {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform .12s;
    }
    .health:hover { transform: scale(1.15); }
    .health::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--dot, var(--h-none));
      box-shadow: 0 0 0 4px var(--dot-soft, rgba(255,255,255,.04));
    }
    .health.h-g { --dot: var(--h-green); --dot-soft: rgba(61,220,132,.16); }
    .health.h-a { --dot: var(--h-amber); --dot-soft: rgba(255,176,32,.16); }
    .health.h-r { --dot: var(--h-red);   --dot-soft: rgba(255,92,92,.16); }
    .health.h-n { --dot: var(--h-none);  --dot-soft: rgba(255,255,255,.04); }

    /* popover de avaliação */
    .rate-pop {
      position: fixed;
      z-index: 50;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 180px;
    }
    .rate-pop[hidden] { display: none; }
    .rate-pop button {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      width: 100%;
    }
    .rate-pop button:hover { background: var(--card-hover); }
    .rate-pop .emoji { font-size: 17px; line-height: 1; }
    .rate-pop .clear {
      color: var(--muted);
      font-weight: 500;
      font-size: 13px;
      border-top: 1px solid var(--line);
      border-radius: 0 0 8px 8px;
      margin-top: 2px;
      padding-top: 11px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      display: none;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    footer button {
      background: none;
      border: none;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }
    footer button:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Setlist para praticar</div>
      <h1>Charlie Brown Jr.</h1>
      <p class="sub">Toque numa música pra abrir a partitura no Songsterr. Toque na bolinha pra registrar como foi o treino — a cor mostra a saúde de cada música.</p>
    </header>

    <div class="controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="search" placeholder="Buscar música…" autocomplete="off">
      </div>
      <div class="sorter">
        <button class="chip active" data-sort="setlist">Setlist</button>
        <button class="chip" data-sort="priority">Prioridade</button>
      </div>
      <div class="mini-meter"><span id="miniFill" class="mini-fill"></span></div>
    </div>

    <div class="meter">
      <div class="meter-bar"><span id="meterFill" class="meter-fill"></span></div>
      <div class="meter-labels">
        <span>Saúde do setlist · <b id="healthPct">–</b></span>
        <span id="attn">–</span>
      </div>
    </div>

    <div class="scale">
      <div class="scale-head">
        <span>Escala de tempo</span>
        <span id="scaleInfo" class="scale-info"></span>
      </div>
      <input type="range" id="scale" min="0" max="100" step="1" value="0">
      <div class="scale-ends"><span>treino constante</span><span>véspera de show</span></div>
    </div>

    <ol id="list"></ol>
    <p class="empty" id="empty">Nenhuma música encontrada.</p>

    <footer>
      <button id="reset">Zerar saúde de todas</button>
    </footer>
  </div>

  <div class="rate-pop" id="ratePop" hidden>
    <button data-r="solid"><span class="emoji">😎</span> Mandei bem</button>
    <button data-r="ok"><span class="emoji">🙂</span> Foi ok</button>
    <button data-r="shaky"><span class="emoji">😬</span> Travei</button>
    <button data-r="clear" class="clear">Ainda não pratiquei</button>
  </div>

  <script>
    const BASE = "https://www.songsterr.com/?pattern=";
    const BAND = "Charlie Brown Jr";
    const songs = [
      ["Pipeline", "1:57"],
      ["Não Viva Em Vão", "3:55"],
      ["Lutar Pelo Que É Meu", "3:57"],
      ["Tudo Mudar", "2:14"],
      ["Te Levar Daqui", "3:05"],
      ["Pontes Indestrutíveis", "3:31"],
      ["Tamo Aí Na Atividade", "3:40"],
      ["Lugar Ao Sol", "3:33"],
      ["Senhor Do Tempo", "3:23"],
      ["Como Tudo Deve Ser", "4:33"],
      ["Não É Sério", "4:52"],
      ["Zoio De Lula", "4:12"],
      ["Meu Novo Mundo", "3:27"],
      ["Ela Vai Voltar", "3:08"],
      ["Dias De Luta, Dias De Glória", "2:21"],
      ["Longe De Você", "3:35"],
      ["Céu Azul", "3:19"],
      ["Só Os Loucos Sabem", "3:16"],
      ["Quebra-Mar", "1:54"],
      ["Tudo Pro Alto", "3:04"],
      ["Samba Makossa", "4:06"],
      ["Vícios E Virtudes", "3:10"],
      ["Quinta-Feira", "5:17"],
      ["Não Uso Sapato", "2:53"],
      ["O Preço", "3:31"],
      ["Só Por Uma Noite", "3:23"],
      ["Me Encontra", "3:31"],
      ["Dona Do Meu Pensamento", "4:00"],
      ["Sino Dourado", "2:41"],
      ["Hoje Eu Acordei Feliz", "2:18"],
      ["O Coro Vai Comê", "2:21"],
      ["Tudo Que Ela Gosta De Escutar", "2:56"],
      ["Rubão, O Dono Do Mundo", "2:15"],
      ["Proibida Pra Mim", "2:48"],
      ["Confisco", "2:59"],
      ["Papo Reto", "3:31"],
      ["Não Deixe O Mar Te Engolir", "5:09"],
      ["Gimme O Anel", "2:50"]
    ];

    // ---- estado (saúde por música) ----
    // store[nome] = { rating: "solid"|"ok"|"shaky", last: "YYYY-MM-DD" }
    const STORE_KEY = "cbjr-setlist-health";
    const store = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
    const save = () => localStorage.setItem(STORE_KEY, JSON.stringify(store));

    // meia-vida da saúde (em dias) por avaliação: quanto mais você domina, mais devagar cai
    const HALF_LIFE = { solid: 60, ok: 14, shaky: 4 };
    const RATING_LABEL = { solid: "Mandei bem", ok: "Foi ok", shaky: "Travei" };

    // ---- datas ----
    // modo simulação: ?sim=30 finge que passaram 30 dias (só pra testar o decaimento).
    // No console: simular(30) recarrega com o offset; simular(0) volta ao normal.
    const SIM_DAYS = parseInt(new URLSearchParams(location.search).get("sim"), 10) || 0;
    window.simular = (d) => {
      const u = new URL(location.href);
      if (d) u.searchParams.set("sim", d); else u.searchParams.delete("sim");
      location.href = u.toString();
    };

    const SIM_MS = SIM_DAYS * 86400000;
    const nowMs = () => Date.now() + SIM_MS;   // "agora" — deslocado pela simulação, se houver
    if (SIM_DAYS) {
      const badge = document.createElement("div");
      badge.textContent = "⏱ simulando +" + SIM_DAYS + " dias — clique pra sair";
      badge.style.cssText =
        "position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:100;" +
        "background:#ffb020;color:#0f1115;font:600 13px/1 -apple-system,sans-serif;" +
        "padding:10px 16px;border-radius:999px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.4)";
      badge.onclick = () => window.simular(0);
      document.body.appendChild(badge);
    }

    // last é gravado em ms (Date.now); o formato antigo "YYYY-MM-DD" ainda é lido
    function lastMs(entry) {
      const v = entry.last;
      if (typeof v === "number") return v;
      const [y, m, d] = String(v).split("-").map(Number);
      return new Date(y, m - 1, d).getTime();
    }
    function elapsedDays(entry) {
      return Math.max(0, (nowMs() - lastMs(entry)) / 86400000);
    }
    function agoText(entry) {
      const days = elapsedDays(entry);
      if (days < 1 / 24) return "agora";
      if (days < 1) return "há " + Math.round(days * 24) + "h";
      const d = Math.round(days);
      return d === 1 ? "ontem" : "há " + d + " dias";
    }

    // escala de tempo: acelera o decaimento proporcionalmente (1 = padrão, longo prazo)
    const SPEED_KEY = "cbjr-setlist-speed";
    const MAX_SPEED = 240;               // extremo: sólida (60d) decai como se durasse ~6h
    let speed = parseFloat(localStorage.getItem(SPEED_KEY)) || 1;

    // ---- saúde ----
    // retorna 0..100, ou null se nunca praticada
    function health(entry) {
      if (!entry) return null;
      const hl = (HALF_LIFE[entry.rating] || 14) / speed;
      const h = 100 * Math.pow(0.5, elapsedDays(entry) / hl);
      return Math.max(0, Math.min(100, h)); // nunca abaixo de 0 nem acima de 100
    }
    function healthClass(h) {
      if (h == null) return "h-n";
      if (h >= 60) return "h-g";
      if (h >= 30) return "h-a";
      return "h-r";
    }

    const list = document.getElementById("list");
    const emptyMsg = document.getElementById("empty");
    const searchInput = document.getElementById("search");
    const meterFill = document.getElementById("meterFill");
    const miniFill = document.getElementById("miniFill");
    const healthPctEl = document.getElementById("healthPct");
    const attnEl = document.getElementById("attn");
    const ratePop = document.getElementById("ratePop");

    // ---- monta as linhas ----
    songs.forEach(([name, duration], i) => {
      const li = document.createElement("li");
      li.dataset.name = name.toLowerCase();
      li.dataset.songName = name;
      li.dataset.index = i;

      const a = document.createElement("a");
      a.className = "song";
      a.href = BASE + encodeURIComponent(BAND + " " + name);
      a.target = "songsterr";
      a.innerHTML =
        '<span class="num">' + (i + 1) + '</span>' +
        '<span class="title"></span>' +
        '<span class="ago"></span>' +
        '<span class="dur">' + duration + '</span>' +
        '<button class="health" title="Registrar treino"></button>';
      a.querySelector(".title").textContent = name;

      a.querySelector(".health").addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        openRatePop(name, e.currentTarget);
      });

      li.appendChild(a);
      list.appendChild(li);
      applyRowState(li);
    });

    function applyRowState(li) {
      const entry = store[li.dataset.songName];
      const h = health(entry);
      const dot = li.querySelector(".health");
      dot.className = "health " + healthClass(h);
      dot.title = entry
        ? RATING_LABEL[entry.rating] + " · " + agoText(entry)
        : "Ainda não praticada — toque pra registrar";
      li.querySelector(".ago").textContent = entry ? agoText(entry) : "nova";
      li.dataset.health = h == null ? -1 : h;
    }

    // ---- popover de avaliação ----
    let currentName = null;
    let currentLi = null;
    function openRatePop(name, anchor) {
      currentName = name;
      currentLi = anchor.closest("li");
      ratePop.hidden = false;
      const r = anchor.getBoundingClientRect();
      const pw = ratePop.offsetWidth, ph = ratePop.offsetHeight;
      let left = r.right - pw;
      let top = r.bottom + 8;
      if (top + ph > window.innerHeight - 8) top = r.top - ph - 8;
      left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
      ratePop.style.left = left + "px";
      ratePop.style.top = top + "px";
    }
    function closeRatePop() { ratePop.hidden = true; currentName = null; currentLi = null; }

    ratePop.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        if (!currentName) return;
        const r = btn.dataset.r;
        if (r === "clear") delete store[currentName];
        else store[currentName] = { rating: r, last: Date.now() };
        save();
        if (currentLi) applyRowState(currentLi);
        updateSummary();
        if (sortMode === "priority") sortList();
        closeRatePop();
      });
    });

    // fecha o popover ao clicar fora ou rolar
    document.addEventListener("click", (e) => {
      if (!ratePop.hidden && !ratePop.contains(e.target) && !e.target.closest(".health")) closeRatePop();
    });
    window.addEventListener("scroll", () => { if (!ratePop.hidden) closeRatePop(); }, true);

    // ---- resumo (barra de saúde do setlist) ----
    function updateSummary() {
      let sum = 0, attention = 0;
      songs.forEach(([name]) => {
        const h = health(store[name]);
        sum += (h == null ? 0 : h);
        if (h == null || h < 30) attention++;
      });
      const avg = songs.length ? sum / songs.length : 0;
      const col = avg >= 60 ? "var(--h-green)" : avg >= 30 ? "var(--h-amber)" : "var(--h-red)";
      meterFill.style.width = avg + "%";
      miniFill.style.width = avg + "%";
      meterFill.style.background = col;
      miniFill.style.background = col;
      healthPctEl.textContent = Math.round(avg) + "%";
      attnEl.innerHTML = attention
        ? '<b class="attn-n">' + attention + "</b> precisam de atenção"
        : "tudo em dia 🎸";
    }
    updateSummary();

    // ---- ordenação ----
    let sortMode = "setlist";
    function sortList() {
      const items = [...list.children];
      items.sort((a, b) => {
        if (sortMode === "setlist") return (+a.dataset.index) - (+b.dataset.index);
        // prioridade: menos saúde primeiro (nunca praticada = -1 vem no topo)
        const diff = (+a.dataset.health) - (+b.dataset.health);
        return diff !== 0 ? diff : (+a.dataset.index) - (+b.dataset.index);
      });
      items.forEach(li => list.appendChild(li));
    }
    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        sortMode = chip.dataset.sort;
        sortList();
      });
    });

    // ---- escala de tempo (slider) ----
    const scaleEl = document.getElementById("scale");
    const scaleInfoEl = document.getElementById("scaleInfo");
    const humanDur = (days) => {
      if (days < 1) {
        const h = days * 24;
        return h < 1 ? Math.round(h * 60) + "min" : Math.round(h) + "h";
      }
      if (days < 45) return Math.round(days) + " dias";
      return Math.round(days / 30) + " meses";
    };
    // tempo até uma música sair do verde (cair abaixo de 60%), por avaliação
    const greenFor = (rating) =>
      ((HALF_LIFE[rating] || 14) / speed) * Math.log(100 / 60) / Math.log(2);
    function updateScaleInfo() {
      scaleInfoEl.textContent =
        "verde por ~ 😎 " + humanDur(greenFor("solid")) +
        " · 🙂 " + humanDur(greenFor("ok")) +
        " · 😬 " + humanDur(greenFor("shaky"));
    }
    // posição inicial do slider a partir do speed salvo
    scaleEl.value = Math.round(100 * Math.log(speed) / Math.log(MAX_SPEED));
    updateScaleInfo();
    scaleEl.addEventListener("input", () => {
      speed = Math.pow(MAX_SPEED, scaleEl.value / 100);
      localStorage.setItem(SPEED_KEY, speed);
      list.querySelectorAll("li").forEach(applyRowState);
      updateSummary();
      updateScaleInfo();
      if (sortMode === "priority") sortList();
    });

    // ---- busca ----
    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      let visible = 0;
      list.querySelectorAll("li").forEach(li => {
        const match = li.dataset.name.includes(q);
        li.style.display = match ? "" : "none";
        if (match) visible++;
      });
      emptyMsg.style.display = visible ? "none" : "block";
    });

    // ---- linha fininha de saúde ao rolar ----
    const miniMeter = document.querySelector(".mini-meter");
    const mainMeter = document.querySelector(".meter");
    new IntersectionObserver(
      ([entry]) => miniMeter.classList.toggle("show", !entry.isIntersecting),
      { rootMargin: "-88px 0px 0px 0px" }
    ).observe(mainMeter);

    // ---- zerar ----
    document.getElementById("reset").addEventListener("click", () => {
      if (!confirm("Zerar a saúde de todas as músicas?")) return;
      for (const k in store) delete store[k];
      save();
      list.querySelectorAll("li").forEach(applyRowState);
      updateSummary();
      if (sortMode === "priority") sortList();
    });
  </script>
</body>
</html>
